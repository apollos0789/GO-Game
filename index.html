<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>圍棋研究室 - GOLAB</title>
    <style>
        :root { --board-bg: #e3bc7d; --panel-bg: #f8f9fa; --text-dark: #2d3436; }
        body { 
            margin: 0; background: #dfe6e9; display: flex; flex-direction: column; 
            align-items: center; font-family: "微軟正黑體", sans-serif; height: 100vh; overflow: hidden;
        }

        /* 讓頂部固定，不隨棋盤滾動 */
        .header-area { width: 100%; display: flex; flex-direction: column; align-items: center; background: var(--panel-bg); z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .controls { width: 100%; max-width: 500px; padding: 10px; display: flex; justify-content: space-around; }
        .status-bar { padding: 10px; display: flex; gap: 10px; align-items: center; font-weight: bold; }

        /* 關鍵：可滾動的棋盤容器 */
        #scroll-viewport {
            flex: 1; width: 100vw; overflow: auto; /* 允許溢出捲動 */
            display: flex; justify-content: flex-start; align-items: flex-start;
            background: #ccc; /* 容器背景深色，突顯棋盤 */
            -webkit-overflow-scrolling: touch; /* iOS 流暢捲動 */
        }

        #game-outer {
            margin: auto; /* 在容器中小於螢幕時居中 */
            padding: 30px; background: var(--board-bg); border: 2px solid #5d4037;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            /* 動態調整寬度 */
            transition: width 0.3s ease;
        }

        #game-container { position: relative; width: 100%; aspect-ratio: 1/1; }
        canvas { width: 100%; height: 100%; cursor: crosshair; touch-action: none; }

        .toolbar { width: 100%; padding: 15px; background: var(--panel-bg); display: flex; justify-content: center; gap: 8px; z-index: 100; }
        button, select { padding: 8px 10px; border: 2px solid var(--text-dark); background: white; font-weight: bold; border-radius: 6px; }
        .zoom-controls { display: flex; align-items: center; gap: 5px; background: #fff; padding: 0 10px; border: 2px solid var(--text-dark); border-radius: 6px; }
        
        .version { position: fixed; bottom: 5px; right: 10px; font-size: 10px; color: #636e72; z-index: 110; }
    </style>
</head>
<body>

<div class="header-area">
    <div class="controls">
        <button onclick="changeSize(9)" id="btn-9">9x9</button>
        <button onclick="changeSize(13)" id="btn-13">13x13</button>
        <button onclick="changeSize(19)" id="btn-19" class="active">19x19</button>
    </div>
    <div class="status-bar">
        <div id="info-black" class="player-info active-black">黑: 0</div>
        <select id="playMode" onchange="updateStatus()">
            <option value="auto">🔄 正常</option>
            <option value="black">⚫ 連黑</option>
            <option value="white">⚪ 連白</option>
        </select>
        <div id="info-white" class="player-info">白: 0</div>
    </div>
</div>

<div id="scroll-viewport">
    <div id="game-outer" style="width: 400px;"> <div id="game-container">
            <canvas id="goBoard"></canvas>
        </div>
    </div>
</div>

<div class="toolbar">
    <div class="zoom-controls">
        <span>縮放:</span>
        <button onclick="adjustZoom(-100)">-</button>
        <button onclick="adjustZoom(100)">+</button>
    </div>
    <button onclick="undo()">悔棋</button>
    <button onclick="toggleNumbers()" id="btn-num">數字</button>
    <button onclick="resetGame()" style="color:red;">清空</button>
</div>

<div class="version">v26.0406.3 | 手機優化版</div>

<script>
// ... (保留原本的變數與 initBoard 邏輯) ...
let currentWidth = 400; // 初始棋盤寬度

function adjustZoom(delta) {
    const outer = document.getElementById('game-outer');
    currentWidth = Math.max(320, Math.min(1000, currentWidth + delta));
    outer.style.width = currentWidth + 'px';
    // 縮放後需要重新渲染畫布
    setTimeout(render, 50); 
}

// 修改落子監聽，支援觸控精確度
canvas.addEventListener('pointerdown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const padding = 25;
    const cellSize = (rect.width - padding * 2) / (boardSize - 1);
    
    // 取得相對於畫布的座標
    const x = Math.round((e.offsetX - padding) / cellSize);
    const y = Math.round((e.offsetY - padding) / cellSize);

    if (x >= 0 && x < boardSize && y >= 0 && y < boardSize && board[y][x] === 0) {
        executeMove(x, y);
    }
});

// ... (其餘邏輯如 getGroup, render, executeMove 保持不變，但記得將 mousedown 改為 pointerdown 以支援手機) ...
</script>
</body>
</html>
